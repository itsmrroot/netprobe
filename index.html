<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Net Probe — Speed Scanner</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="container">

    <div class="header">
      <svg class="logo-mark" viewBox="0 0 64 64" aria-hidden="true">
        <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="2" opacity="0.9"/>
        <circle cx="32" cy="32" r="13" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.5"/>
        <line x1="32" y1="6"  x2="32" y2="12" stroke="currentColor" stroke-width="2" opacity="0.9"/>
        <line x1="32" y1="52" x2="32" y2="58" stroke="currentColor" stroke-width="2" opacity="0.9"/>
        <line x1="6"  y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="2" opacity="0.9"/>
        <line x1="52" y1="32" x2="58" y2="32" stroke="currentColor" stroke-width="2" opacity="0.9"/>
        <line x1="32" y1="32" x2="46" y2="20" stroke="currentColor" stroke-width="2" opacity="0.85" stroke-linecap="round"/>
        <circle cx="46" cy="20" r="3.4" fill="currentColor"/>
        <circle cx="32" cy="32" r="2.2" fill="currentColor"/>
      </svg>
      <h1>Net Probe</h1>
      <h2>Speed Scanner</h2>
    </div>

    <div class="radar-wrapper">
      <canvas class="radar-canvas" id="radar" width="560" height="560"></canvas>
      <div class="speed-display">
        <span class="speed-number" id="speedNum">--</span>
        <span class="speed-unit">Mbps</span>
        <span class="speed-label" id="speedLabel">ready</span>
      </div>
    </div>

    <div class="graph-panel">
      <div class="graph-card">
        <div class="graph-label">Download</div>
        <div class="graph-value"><span id="graph-val-dl">--</span><span class="graph-unit">Mbps</span></div>
        <canvas class="graph-canvas" id="graph-dl" width="300" height="110"></canvas>
      </div>
      <div class="graph-card">
        <div class="graph-label">Upload</div>
        <div class="graph-value"><span id="graph-val-ul">--</span><span class="graph-unit">Mbps</span></div>
        <canvas class="graph-canvas" id="graph-ul" width="300" height="110"></canvas>
      </div>
    </div>

    <div class="metrics">
      <div class="metric-card" id="card-dl">
        <span class="metric-icon">↓</span>
        <span class="metric-value" id="val-dl">--</span>
        <span class="metric-label">Download</span>
        <span class="metric-sub">Mbps</span>
      </div>
      <div class="metric-card" id="card-ul">
        <span class="metric-icon">↑</span>
        <span class="metric-value" id="val-ul">--</span>
        <span class="metric-label">Upload</span>
        <span class="metric-sub">Mbps</span>
      </div>
      <div class="metric-card" id="card-ping">
        <span class="metric-icon">◎</span>
        <span class="metric-value" id="val-ping">--</span>
        <span class="metric-label">Ping</span>
        <span class="metric-sub">ms</span>
      </div>
    </div>

    <div class="ip-panel">
      <div class="ip-panel-title">Connection identity</div>
      <div class="ip-grid">
        <div class="ip-row">
          <span class="ip-key">Public IP</span>
          <span class="ip-val loading" id="ip-addr">Detecting...</span>
        </div>
        <div class="ip-row">
          <span class="ip-key">Country</span>
          <span class="ip-val loading" id="ip-country">Detecting...</span>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Ready to scan your connection</span>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="scan-btn" id="scanBtn" onclick="startScan()">Scan Now</button>
      <button class="stop-btn" id="stopBtn" onclick="stopScan()">Stop</button>
      <button class="retry-btn" id="retryBtn" onclick="retryScan()">Retry</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
